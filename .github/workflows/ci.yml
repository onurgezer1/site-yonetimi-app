name: SmartYonetim CI/CD

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main ]

jobs:
    tests:
        runs-on: ubuntu-latest
        
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: smartyonetim_test
                    POSTGRES_USER: laravel
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432
                    
            redis:
                image: redis:7
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379

        steps:
        - uses: actions/checkout@v4

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '8.3'
              extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql, dom, filter, gd, json, pgsql, redis
              tools: composer:v2

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: '20'
              cache: 'npm'

        - name: Copy .env
          run: php -r "file_exists('.env') || copy('.env.example', '.env');"

        - name: Install Dependencies
          run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

        - name: Install NPM Dependencies
          run: npm ci

        - name: Generate key
          run: php artisan key:generate

        - name: Directory Permissions
          run: chmod -R 755 storage bootstrap/cache

        - name: Build Assets
          run: npm run build

        - name: Run Database Migrations
          run: php artisan migrate --force
          env:
              DB_CONNECTION: pgsql
              DB_HOST: 127.0.0.1
              DB_PORT: 5432
              DB_DATABASE: smartyonetim_test
              DB_USERNAME: laravel
              DB_PASSWORD: password

        - name: Execute tests (Unit and Feature tests) via PHPUnit
          run: php artisan test
          env:
              DB_CONNECTION: pgsql
              DB_HOST: 127.0.0.1
              DB_PORT: 5432
              DB_DATABASE: smartyonetim_test
              DB_USERNAME: laravel
              DB_PASSWORD: password

    code-quality:
        runs-on: ubuntu-latest
        
        steps:
        - uses: actions/checkout@v4

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '8.3'
              extensions: mbstring, xml, ctype, iconv, intl, pdo_pgsql
              tools: composer:v2

        - name: Install Dependencies
          run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

        - name: Run PHP CS Fixer
          run: composer run-script cs-fix -- --dry-run --diff

        - name: Run PHPStan
          run: composer run-script phpstan

    security:
        runs-on: ubuntu-latest
        
        steps:
        - uses: actions/checkout@v4

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
              php-version: '8.3'
              tools: composer:v2

        - name: Security Checker
          run: composer audit